receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        # arc-messaging: NATS monitoring endpoint (Prometheus format)
        - job_name: arc-messaging
          scrape_interval: 15s
          static_configs:
            - targets: ['arc-messaging:8222']
        # arc-streaming: Pulsar metrics endpoint
        - job_name: arc-streaming
          scrape_interval: 15s
          static_configs:
            - targets: ['arc-streaming:8080']
        # arc-gateway: Traefik Prometheus endpoint (traefik entrypoint = container:8081)
        - job_name: arc-gateway
          scrape_interval: 15s
          static_configs:
            - targets: ['arc-gateway:8081']
        # arc-cache: redis_exporter sidecar (oliver006/redis_exporter, container:9121)
        - job_name: arc-cache
          scrape_interval: 15s
          static_configs:
            - targets: ['arc-cache-exporter:9121']
        # arc-sql-db: postgres_exporter sidecar (prometheuscommunity/postgres-exporter, container:9187)
        - job_name: arc-sql-db
          scrape_interval: 15s
          static_configs:
            - targets: ['arc-sql-db-exporter:9187']
        # arc-storage: MinIO native Prometheus endpoint (unauthenticated via MINIO_PROMETHEUS_AUTH_TYPE=public)
        - job_name: arc-storage
          scrape_interval: 15s
          static_configs:
            - targets: ['arc-storage:9000']
          metrics_path: /minio/v2/metrics/cluster

processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s

exporters:
  clickhousetraces:
    datasource: tcp://arc-friday-clickhouse:9000/?database=signoz_traces

  signozclickhousemetrics:
    dsn: tcp://arc-friday-clickhouse:9000/signoz_metrics

  clickhouselogsexporter:
    dsn: tcp://arc-friday-clickhouse:9000/signoz_logs
    timeout: 10s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [signozclickhousemetrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouselogsexporter]
