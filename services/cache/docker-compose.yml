name: arc-platform

services:
  arc-cache:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/arc-framework/arc-cache:latest
    container_name: arc-cache
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
    ports:
      - "127.0.0.1:6379:6379"   # Redis — localhost only
    volumes:
      - sonic-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - arc_platform_net
    restart: unless-stopped

  # ── redis_exporter: Prometheus metrics sidecar for arc-cache ─────────────
  # Exposes Redis metrics at :9121/metrics — scraped by arc-friday-collector.
  arc-cache-exporter:
    image: oliver006/redis_exporter:latest
    container_name: arc-cache-exporter
    environment:
      REDIS_ADDR: "redis://arc-cache:6379"
    networks:
      - arc_platform_net
    restart: unless-stopped

volumes:
  sonic-data:
    name: arc-cache-data

networks:
  arc_platform_net:
    external: true
    name: arc_platform_net
