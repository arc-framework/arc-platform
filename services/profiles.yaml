# A.R.C. Service Profiles
# Profiles select which services compose a running platform.
# Usage: make up PROFILE=think | arc run --profile reason

# ─── think ──────────────────────────────────────────────────────
# Basic reasoning — minimal services to run an agent
think:
  description: 'Default dev stack — core infra + reasoner + observability, no secrets/flags/storage'
  services:
    - messaging
    - cache
    - streaming
    - cortex
    - sql-db
    - gateway
    - friday-collector
    - reasoner

# ─── observe ────────────────────────────────────────────────────
# think + SigNoz UI — full OTEL traces/metrics/logs in the browser at :3301
observe:
  description: 'think profile + SigNoz observability UI (arc-friday :3301)'
  services:
    - messaging
    - cache
    - streaming
    - cortex
    - sql-db
    - gateway
    - friday-collector
    - reasoner
    - otel

# ─── reason ─────────────────────────────────────────────────────
# Full dev stack — think + observability + identity + storage + realtime
reason:
  description: 'Full development stack — think + observability + secrets/flags/storage/realtime'
  services:
    - messaging
    - cache
    - streaming
    - cortex
    - sql-db
    - gateway
    - friday-collector
    - reasoner
    - otel
    - storage
    - vault
    - flags
    - realtime

# ─── ultra-instinct ─────────────────────────────────────────────
# Everything — voice, real-time, chaos testing, the full roster
ultra-instinct:
  description: 'Full power — every service, every capability'
  services: '*'
