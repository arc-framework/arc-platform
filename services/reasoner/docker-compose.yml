name: arc-platform

services:

  # ── Sherlock: LangGraph reasoning engine ──────────────────────────────────
  # Three invocation modes:
  #   - HTTP sync:  POST http://localhost:8083/chat
  #   - NATS:       subscribe sherlock.request (queue group: sherlock_workers)
  #   - Pulsar:     sherlock-requests topic (opt-in, SHERLOCK_PULSAR_ENABLED=true)
  #
  # Networks:
  #   arc_platform_net — reaches arc-sql-db, arc-vector-db, arc-messaging, arc-streaming
  #   arc_otel_net     — reaches arc-friday-collector for OTLP telemetry
  #
  # No depends_on — orchestration handled by resolve-deps.sh using service.yaml
  arc-sherlock:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/arc-framework/arc-sherlock:latest
    container_name: arc-sherlock
    ports:
      - "127.0.0.1:8083:8000"   # localhost-only; cortex=8081, pulsar-admin=8082
    environment:
      SHERLOCK_POSTGRES_URL: "postgresql+asyncpg://arc:arc@arc-sql-db:5432/arc"
      SHERLOCK_NATS_URL: "nats://arc-messaging:4222"
      LOG_LEVEL: "debug"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://arc-friday-collector:4317"
      # For local binary runs override with: OTEL_EXPORTER_OTLP_ENDPOINT=127.0.0.1:4317
      OTEL_SERVICE_NAME: "arc-sherlock"
      OTEL_SERVICE_VERSION: "0.1.0"
      OTEL_DEPLOYMENT_ENVIRONMENT: "development"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=arc-platform,service.instance.id=arc-sherlock-1"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      OTEL_LOG_LEVEL: "warn"
      # LM Studio runs on the host — host.docker.internal resolves to the Mac from inside the container
      SHERLOCK_LLM_BASE_URL: "http://host.docker.internal:1234/v1"
      # RAG (feature 013) — enabled by default; requires arc-storage (MinIO)
      SHERLOCK_RAG_ENABLED: "true"
      SHERLOCK_MINIO_ENDPOINT: "arc-storage:9000"
      SHERLOCK_MINIO_ACCESS_KEY: "arc"
      SHERLOCK_MINIO_SECRET_KEY: "arc-minio-dev"
      SHERLOCK_MINIO_BUCKET: "sherlock-files"
      # SHERLOCK_LLM_SUPPORTS_SYSTEM_ROLE — omitted: auto-detected from model name.
      # Set to true/false explicitly only when the heuristic is wrong (e.g. ChatML Llama fine-tune).
      # SHERLOCK_SYSTEM_PROMPT — omitted: uses the default Sherlock persona.
      # Override to swap persona without rebuilding the image.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=arc_platform_net"
      - "traefik.http.routers.reasoner.rule=PathPrefix(`/api/reasoner`)"
      - "traefik.http.routers.reasoner.entrypoints=web"
      - "traefik.http.middlewares.strip-reasoner.stripprefix.prefixes=/api/reasoner"
      - "traefik.http.routers.reasoner.middlewares=strip-reasoner"
      - "traefik.http.services.reasoner.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s   # sentence-transformers model download on first cold start
    networks:
      - arc_platform_net
      - arc_otel_net
    restart: unless-stopped

networks:
  arc_platform_net:
    external: true   # created by the platform infra stack (make dev)
  arc_otel_net:
    external: true   # created by: make otel-up
