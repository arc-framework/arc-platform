name: arc-sherlock
role: reasoner
codename: sherlock
image: ghcr.io/arc-framework/arc-sherlock:latest
version: "0.3.0"
description: "LangGraph reasoning engine with pgvector memory, NATS integration, and RAG knowledge base"
language: python
port: 8083
health: http://localhost:8083/health
timeout: 180        # sentence-transformers model download on first cold start
healthcheck:
  test: "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 60s
depends_on:
  - sql-db           # arc-sql-db (PostgreSQL — conversation history)
  - messaging        # arc-messaging (NATS — real-time request-reply)
  - streaming        # arc-streaming (Pulsar — durable async, optional)
  - friday-collector # arc-friday-collector (OTEL)
  - storage          # arc-storage (MinIO — RAG file storage)
