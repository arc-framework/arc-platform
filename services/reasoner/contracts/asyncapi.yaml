asyncapi: 3.0.0

info:
  title: Reasoner Service — Async API
  version: 0.1.0
  description: |
    Event-driven interfaces for the Reasoner service (`arc-reasoner`).

    Two transports are documented here:
    - **NATS** (Flash, `arc-messaging:4222`): real-time request-reply and fire-and-forget
    - **Pulsar** (Dr. Strange, `arc-streaming:6650`): durable at-least-once async processing

    Pulsar is opt-in — only active when `REASONER_PULSAR_ENABLED=true`.
    For synchronous HTTP see `openapi.yaml`.

x-deprecated-addresses:
  - sherlock.request
  - sherlock.result
  - sherlock.v1.chat
  - sherlock.v1.result
  - sherlock-requests (Pulsar)
  - sherlock-results (Pulsar)

servers:
  nats:
    host: arc-messaging:4222
    protocol: nats
    description: |
      Flash — NATS messaging broker. Real-time request-reply via ephemeral
      `_INBOX` subjects. Queue group `reasoner_workers` distributes load
      across multiple Reasoner replicas.
    tags:
      - name: transport:nats
        description: Real-time low-latency messaging

  pulsar:
    host: arc-streaming:6650
    protocol: pulsar
    description: |
      Dr. Strange — Apache Pulsar streaming. Persistent topics with
      at-least-once delivery. Durable reasoning tasks survive Reasoner restarts.
      Requires `REASONER_PULSAR_ENABLED=true`.
    tags:
      - name: transport:pulsar
        description: Durable async message streaming

channels:
  reasonerRequest:
    address: reasoner.request
    servers:
      - $ref: '#/servers/nats'
    tags:
      - name: reasoner-core
        description: Core reasoning channels
    description: |
      Inbound NATS subject for real-time reasoning requests.

      **Request-reply** (blocking caller):
        Caller sends with `nc.request()` which attaches an ephemeral `_INBOX.xxx`
        reply subject. Reasoner responds via `msg.respond()` to that inbox.

      **Fire-and-forget** (non-blocking):
        Caller sends with `nc.publish()` — no reply subject set.
        Reasoner processes the message but skips `msg.respond()`.

      Queue group `reasoner_workers` ensures exactly one replica processes
      each message, enabling horizontal scale-out.
    messages:
      ReasoningRequest:
        $ref: '#/components/messages/ReasoningRequest'

  reasonerRequests:
    address: persistent://public/default/reasoner-requests
    servers:
      - $ref: '#/servers/pulsar'
    tags:
      - name: reasoner-core
        description: Core reasoning channels
    description: |
      Inbound Pulsar topic for durable reasoning tasks.
      Reasoner subscribes with subscription name `reasoner-workers`
      (Shared type — round-robin across replicas).

      Requires `REASONER_PULSAR_ENABLED=true` to be active.
      On successful processing the message is acknowledged.
      On any exception during `invoke_graph` a `negative_acknowledge`
      is issued — Pulsar redelivers to another available replica.
    messages:
      DurableReasoningRequest:
        $ref: '#/components/messages/DurableReasoningRequest'

  reasonerResults:
    address: persistent://public/default/reasoner-results
    servers:
      - $ref: '#/servers/pulsar'
    tags:
      - name: reasoner-core
        description: Core reasoning channels
    description: |
      Outbound Pulsar topic where Reasoner publishes results for durable requests.
      Callers correlate responses using the `request_id` echoed from the original request.

      Consumers should use a dedicated subscription per caller service.
      Results are published only after the message is successfully processed;
      failed requests are negatively-acked on the input topic without publishing here.
    messages:
      ReasoningResult:
        $ref: '#/components/messages/ReasoningResult'

  reasonerV1Chat:
    address: reasoner.v1.chat
    servers:
      - $ref: '#/servers/nats'
    tags:
      - name: reasoner-v1
        description: Reasoner Chat API v1 (OpenAI wire format)
    description: |
      Inbound NATS subject for v1 Chat API requests in OpenAI wire format.

      Callers publish a `ChatCompletionRequest` JSON payload.
      Queue group `reasoner_workers` distributes messages across replicas.

      **Request-reply** (blocking): caller uses `nc.request()` — Reasoner responds
      to the ephemeral `_INBOX` subject AND publishes to `reasoner.v1.result`.
      **Fire-and-forget**: caller uses `nc.publish()` — Reasoner only publishes
      to `reasoner.v1.result`, skipping `msg.respond()`.
    messages:
      V1ChatRequest:
        $ref: '#/components/messages/V1ChatRequest'

  reasonerV1Result:
    address: reasoner.v1.result
    servers:
      - $ref: '#/servers/nats'
    tags:
      - name: reasoner-v1
        description: Reasoner Chat API v1 (OpenAI wire format)
    description: |
      Outbound NATS subject where Reasoner publishes `ChatCompletionResponse`
      for every processed `reasoner.v1.chat` message.

      Callers subscribe here to receive async results.
      The `id` field in the response can be used for correlation.
    messages:
      V1ChatResult:
        $ref: '#/components/messages/V1ChatResult'

operations:
  receiveNatsRequest:
    action: receive
    channel:
      $ref: '#/channels/reasonerRequest'
    tags:
      - name: reasoner-core
        description: Core reasoning channels
    title: Receive NATS reasoning request
    summary: Real-time reasoning request via NATS
    description: |
      Reasoner subscribes to `reasoner.request` in queue group `reasoner_workers`.

      Processing flow:
      1. Decode JSON payload → `{user_id, text}`
      2. Call `invoke_graph(graph, memory, user_id, text)`
      3. If `msg.reply` is set: publish result to ephemeral inbox via `msg.respond()`
      4. If no `msg.reply` (fire-and-forget): skip respond, log and return

      On exception: log error, respond with `{error: str, latency_ms: N}` if `msg.reply` set.
    messages:
      - $ref: '#/channels/reasonerRequest/messages/ReasoningRequest'

  receivePulsarRequest:
    action: receive
    channel:
      $ref: '#/channels/reasonerRequests'
    tags:
      - name: reasoner-core
        description: Core reasoning channels
    title: Consume Pulsar durable reasoning task
    summary: At-least-once durable reasoning via Pulsar
    description: |
      Reasoner's PulsarHandler consumes from `reasoner-requests` (Shared subscription).

      Processing flow:
      1. `consumer.receive(timeout_millis=5000)` via `asyncio.to_thread`
      2. Spawn `asyncio.Task` per message (concurrent inference)
      3. Decode JSON → `{request_id, user_id, text}`
      4. Call `invoke_graph(graph, memory, user_id, text)`
      5. `consumer.acknowledge(msg)` on success
      6. `consumer.negative_acknowledge(msg)` on exception → redelivery

      The consume loop itself never blocks the asyncio event loop.
    messages:
      - $ref: '#/channels/reasonerRequests/messages/DurableReasoningRequest'

  publishPulsarResult:
    action: send
    channel:
      $ref: '#/channels/reasonerResults'
    tags:
      - name: reasoner-core
        description: Core reasoning channels
    title: Publish reasoning result to Pulsar
    summary: Publish completed result for caller correlation
    description: |
      After successful `invoke_graph`, Reasoner publishes to `reasoner-results`.
      Callers match results to requests via `request_id`.

      Published via `asyncio.to_thread(producer.send, ...)` to avoid blocking.
      Not published if graph raises an exception (caller receives nack + redelivery).
    messages:
      - $ref: '#/channels/reasonerResults/messages/ReasoningResult'

  receiveV1ChatRequest:
    action: receive
    channel:
      $ref: '#/channels/reasonerV1Chat'
    tags:
      - name: reasoner-v1
        description: Reasoner Chat API v1 (OpenAI wire format)
    title: Receive v1 Chat request via NATS
    summary: OpenAI-compatible chat request via NATS
    description: |
      `OpenAINATSHandler` subscribes to `reasoner.v1.chat` in queue group `reasoner_workers`.

      Processing flow:
      1. Deserialize `ChatCompletionRequest` JSON
      2. Derive `user_id` from `request.user` or UUID v5 of user message content
      3. Extract `text` from last user message in `messages[]`
      4. Call `invoke_graph(graph, memory, user_id, text)`
      5. Build `ChatCompletionResponse` with the response
      6. If `msg.reply` set: respond to inbox AND publish to `reasoner.v1.result`
      7. If fire-and-forget: publish to `reasoner.v1.result` only

      On exception: publish error `ChatCompletionResponse` (never crashes).
    messages:
      - $ref: '#/channels/reasonerV1Chat/messages/V1ChatRequest'

  publishV1ChatResult:
    action: send
    channel:
      $ref: '#/channels/reasonerV1Result'
    tags:
      - name: reasoner-v1
        description: Reasoner Chat API v1 (OpenAI wire format)
    title: Publish v1 Chat result via NATS
    summary: ChatCompletionResponse published for every processed v1 chat request
    description: |
      Published to `reasoner.v1.result` after every `reasoner.v1.chat` message,
      regardless of success or error. Error responses include the error in
      `choices[0].message.content` prefixed with "Error: ".
    messages:
      - $ref: '#/channels/reasonerV1Result/messages/V1ChatResult'

components:
  messages:
    ReasoningRequest:
      name: ReasoningRequest
      title: NATS Reasoning Request
      summary: Real-time request for the Reasoner to reason about
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ReasoningRequestPayload'
      examples:
        - name: basic_request
          summary: Single-turn request
          payload:
            user_id: "user-123"
            text: "What are the main benefits of vector databases?"
        - name: follow_up
          summary: Follow-up leveraging conversation history
          payload:
            user_id: "user-123"
            text: "Can you expand on the second point?"

    DurableReasoningRequest:
      name: DurableReasoningRequest
      title: Pulsar Durable Reasoning Request
      summary: Persistent reasoning task with caller-assigned correlation ID
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DurableReasoningRequestPayload'
      examples:
        - name: batch_research
          summary: Background research task
          payload:
            request_id: "req-abc-123"
            user_id: "agent-researcher-7"
            text: "Summarize the key themes from our last 10 conversations"
        - name: document_analysis
          summary: Long document analysis task
          payload:
            request_id: "req-def-456"
            user_id: "agent-analyst-2"
            text: "Analyze the attached context for inconsistencies"

    ReasoningResult:
      name: ReasoningResult
      title: Pulsar Reasoning Result
      summary: Completed reasoning result echoing the original request_id
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ReasoningResultPayload'
      examples:
        - name: successful_result
          summary: Successful reasoning completion
          payload:
            request_id: "req-abc-123"
            user_id: "agent-researcher-7"
            text: "Across the last 10 conversations, three recurring themes emerge..."
            latency_ms: 3750
        - name: error_result
          summary: Reasoning failed after retries
          payload:
            request_id: "req-def-456"
            user_id: "agent-analyst-2"
            error: "LLM unavailable after 3 retries"
            latency_ms: 9100

    V1ChatRequest:
      name: V1ChatRequest
      title: v1 Chat Completion Request
      summary: OpenAI-compatible chat request via NATS
      contentType: application/json
      payload:
        $ref: '#/components/schemas/V1ChatRequestPayload'
      examples:
        - name: basic_chat
          summary: Simple question
          payload:
            model: "mistralai/mistral-7b-instruct-v0.3"
            messages:
              - role: user
                content: "What is the capital of France?"
            stream: false
            user: "user-123"
        - name: no_user
          summary: Request without user field (user_id derived automatically)
          payload:
            model: "mistralai/mistral-7b-instruct-v0.3"
            messages:
              - role: user
                content: "Hello!"
            stream: false

    V1ChatResult:
      name: V1ChatResult
      title: v1 Chat Completion Result
      summary: OpenAI-compatible completion response
      contentType: application/json
      payload:
        $ref: '#/components/schemas/V1ChatResultPayload'
      examples:
        - name: success
          summary: Successful completion
          payload:
            id: "chatcmpl-abc123"
            object: chat.completion
            created: 1741000000
            model: "mistralai/mistral-7b-instruct-v0.3"
            choices:
              - index: 0
                message:
                  role: assistant
                  content: "The capital of France is Paris."
                finish_reason: stop
            usage:
              prompt_tokens: 0
              completion_tokens: 0
              total_tokens: 0
        - name: error
          summary: Error response
          payload:
            id: "chatcmpl-err456"
            object: chat.completion
            created: 1741000001
            model: "unknown"
            choices:
              - index: 0
                message:
                  role: assistant
                  content: "Error: No user message found"
                finish_reason: null
            usage:
              prompt_tokens: 0
              completion_tokens: 0
              total_tokens: 0

  schemas:
    ReasoningRequestPayload:
      type: object
      required:
        - user_id
        - text
      properties:
        user_id:
          type: string
          description: |
            Unique identifier for the user or agent session.
            Used to scope pgvector search and PostgreSQL history queries.
          example: "user-123"
          minLength: 1
        text:
          type: string
          description: The message or question to reason about.
          example: "What are the main benefits of vector databases?"
          minLength: 1

    DurableReasoningRequestPayload:
      type: object
      required:
        - request_id
        - user_id
        - text
      properties:
        request_id:
          type: string
          description: |
            Caller-assigned unique correlation ID. Echoed verbatim in the result
            published to `reasoner-results`. Must be unique per request to avoid
            result correlation ambiguity.
          example: "req-abc-123"
          minLength: 1
        user_id:
          type: string
          description: |
            Unique identifier for the user or agent session.
            Scopes memory retrieval and persistence.
          example: "agent-researcher-7"
          minLength: 1
        text:
          type: string
          description: The reasoning task description or question.
          example: "Summarize the key themes from our last 10 conversations"
          minLength: 1

    ReasoningResultPayload:
      type: object
      required:
        - request_id
        - user_id
        - latency_ms
      properties:
        request_id:
          type: string
          description: Echoed from the original DurableReasoningRequest for caller correlation.
          example: "req-abc-123"
        user_id:
          type: string
          description: Echoed from the original request.
          example: "agent-researcher-7"
        text:
          type: string
          description: |
            Reasoner's response. Present on success.
            Mutually exclusive with `error`.
          example: "Across the last 10 conversations, three recurring themes emerge..."
        error:
          type: string
          description: |
            Error message when reasoning failed after all retries.
            Present on failure. Mutually exclusive with `text`.
          example: "LLM unavailable after 3 retries"
        latency_ms:
          type: integer
          description: Total end-to-end processing time in milliseconds.
          example: 3750
          minimum: 0

    V1ChatRequestPayload:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: The model ID to use. Must match REASONER_LLM_MODEL.
          example: "mistralai/mistral-7b-instruct-v0.3"
        messages:
          type: array
          description: Conversation history in role/content format.
          items:
            type: object
            required: [role]
            properties:
              role:
                type: string
                enum: [system, user, assistant, tool]
              content:
                type: string
                nullable: true
        stream:
          type: boolean
          default: false
          description: Ignored over NATS — streaming is HTTP-only.
        user:
          type: string
          nullable: true
          description: |
            Optional caller-assigned user identifier. When absent, a deterministic
            UUID v5 is derived from the joined user message content.

    V1ChatResultPayload:
      type: object
      required: [id, object, created, model, choices, usage]
      properties:
        id:
          type: string
          example: "chatcmpl-abc123"
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp of response creation.
        model:
          type: string
          example: "mistralai/mistral-7b-instruct-v0.3"
        choices:
          type: array
          items:
            type: object
            required: [index, message]
            properties:
              index:
                type: integer
              message:
                type: object
                required: [role, content]
                properties:
                  role:
                    type: string
                    enum: [assistant]
                  content:
                    type: string
              finish_reason:
                type: string
                nullable: true
        usage:
          type: object
          required: [prompt_tokens, completion_tokens, total_tokens]
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
