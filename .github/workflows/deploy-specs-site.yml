name: Deploy Specs Site

on:
  push:
    branches: [main]
    paths:
      - "specs/**"
      - "docs/specs/**"
      - ".github/workflows/deploy-specs-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/specs/package-lock.json

      - run: npm ci
        working-directory: docs/specs

      - run: npm run build
        working-directory: docs/specs

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/specs/.vitepress/dist
          destination_dir: specs-site

      - name: Register deployment URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deployment_id=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            --input - <<EOF
          {"ref":"${{ github.sha }}","environment":"specs-site","description":"Specs site deploy","auto_merge":false,"required_contexts":[]}
          EOF
          )
          deployment_id=$(echo "$deployment_id" | jq -r '.id')
          gh api repos/${{ github.repository }}/deployments/$deployment_id/statuses \
            --method POST \
            --input - <<EOF
          {"state":"success","environment_url":"https://arc-framework.github.io/arc-platform/specs-site/","description":"Specs site is live"}
          EOF
          echo "### Specs Site Deployed" >> $GITHUB_STEP_SUMMARY
          echo "[https://arc-framework.github.io/arc-platform/specs-site/](https://arc-framework.github.io/arc-platform/specs-site/)" >> $GITHUB_STEP_SUMMARY
