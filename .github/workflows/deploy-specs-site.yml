name: Deploy Specs Site

on:
  push:
    branches: [main]
    paths:
      - "specs/**"
      - "docs/specs/**"
      - ".github/workflows/deploy-specs-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/specs/package-lock.json

      - run: npm ci
        working-directory: docs/specs

      - run: npm run build
        working-directory: docs/specs

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/specs/.vitepress/dist
          destination_dir: specs-site

      - name: Register deployment URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deployment_id=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            --field ref=${{ github.sha }} \
            --field environment=specs-site \
            --field description="Specs site deploy" \
            --field auto_merge=false \
            --field required_contexts='[]' \
            --jq '.id')
          gh api repos/${{ github.repository }}/deployments/$deployment_id/statuses \
            --method POST \
            --field state=success \
            --field environment_url=https://arc-framework.github.io/arc-platform/specs-site/ \
            --field description="Specs site is live"
          echo "### Specs Site Deployed" >> $GITHUB_STEP_SUMMARY
          echo "[https://arc-framework.github.io/arc-platform/specs-site/](https://arc-framework.github.io/arc-platform/specs-site/)" >> $GITHUB_STEP_SUMMARY
